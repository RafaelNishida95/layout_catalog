<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Moyo Catalog</title>
    <link rel="stylesheet" href="./styles/main.css">
  </head>
  <body class="page">

    <!-- HEADER -->
    <header class="header">
      <div class="header__container">
        <a href="#" class="header__logo">MOYO</a>

        <nav class="header__nav">
          <ul class="header__list">
            <li class="header__item">
              <a href="#" class="header__link is-active">All</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">New</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Clothes</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Shoes</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Accessories</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

  <!-- MAIN -->
  <main class="main">

    <!-- FILTER -->
    <section class="filter">
      <div class="filter__container">
        <input
          type="text"
          class="filter__input"
          placeholder="Search..."
        />

        <select class="filter__select">
          <option>All categories</option>
          <option>Clothes</option>
          <option>Shoes</option>
          <option>Accessories</option>
        </select>
      </div>
    </section>

    <!-- CATALOG -->
    <section class="catalog">
      <div class="catalog__grid">

        <!-- CARD -->
        <article class="card">
          <img src="./images/product-1.jpg" alt="" class="card__image">
          <h3 class="card__title">Product Name</h3>
          <p class="card__price">$120</p>
        </article>

        <article class="card">
          <img src="./images/product-2.jpg" alt="" class="card__image">
          <h3 class="card__title">Product Name</h3>
          <p class="card__price">$99</p>
        </article>

        <article class="card">
          <img src="./images/product-3.jpg" alt="" class="card__image">
          <h3 class="card__title">Product Name</h3>
          <p class="card__price">$150</p>
        </article>

        <article class="card">
          <img src="./images/product-4.jpg" alt="" class="card__image">
          <h3 class="card__title">Product Name</h3>
          <p class="card__price">$80</p>
        </article>

      </div>
    </section>

  </main>

</body>
</html>
